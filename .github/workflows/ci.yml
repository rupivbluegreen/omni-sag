name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: make build
      - name: Lint (gofmt + vet)
        run: make lint
      - name: Import rules
        run: make check-imports
      - name: Test
        run: make test
