name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        run: make build
      - name: Lint (gofmt + vet)
        run: make lint
      - name: Import rules
        run: make check-imports
      - name: Test
        run: make test

  binaries:
    name: Build binaries
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # for git describe (version stamp)
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }} binaries
        run: make binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Checksums
        run: cd bin && sha256sum * > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: omni-sag-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/*
          if-no-files-found: error
