name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    name: Build & publish binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # for the git-describe version stamp
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cross-build every command
        run: |
          set -euo pipefail
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${pair%/*}" GOARCH="${pair#*/}" make binaries
          done
          cd bin && sha256sum * > SHA256SUMS
          echo "== artifacts ==" && ls -1

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" bin/* \
            --title "Omni-SAG ${GITHUB_REF_NAME}" \
            --generate-notes
