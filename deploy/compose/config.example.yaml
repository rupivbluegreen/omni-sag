# Sample config for the docker-compose dev lab (samba-AD + MinIO + FreeRADIUS).
# Run: omni-sag -config deploy/compose/config.example.yaml
listen: ":2222"
host_key: "hostkey.pem"

# drain_grace_seconds: how long a rolling restart waits for in-flight SSH
# sessions to finish before SIGKILL. Default 30 if omitted.
# drain_grace_seconds: 30

# Real-target second SSH leg (shell/SFTP proxy to the ssh-target container
# below): dev-lab only, no target_known_hosts file exists in this lab, so
# host-key verification for that second leg is explicitly disabled. Without
# EITHER this or target_known_hosts, dialTarget fails closed and the
# Real-target demo rule below can never succeed. Never set this in production.
target_insecure_host_key: true
# Production alternative: pin real target host keys instead of the insecure
# bypass above (set exactly one of the two).
# target_known_hosts: "/etc/omni-sag/target_known_hosts"

# FIPS-readiness posture: off (default) | warn | enforce. enforce rejects
# non-FIPS TLS params and insecure_tls at boot; see docs/fips.md.
# fips:
#   mode: enforce

# Prometheus metrics, on its own out-of-band listener.
# metrics:
#   listen: ":9090"

# Event export / SIEM integration. Opt-in (default off). Streams every
# evidence event (auth, tunnel_decision, session, transfer, inspection,
# credential, approval, ...) to one or more SIEMs in real time, ALONGSIDE the
# durable evidence pipeline (which stays the authoritative, tamper-evident
# record). Delivery is BEST-EFFORT and never blocks a session: if a SIEM is
# slow or down, events are dropped (counted in the metrics as
# omnisag_eventexport_dropped_total) rather than stalling the gateway.
#
# format:    json | ecs (Elastic Common Schema) | cef (ArcSight)
# transport: file (for a filebeat/logbeat/vector tailer) | syslog (udp|tcp|tls,
#            RFC 5424 + RFC 6587 octet-counting) | http (NDJSON batches, e.g.
#            Elastic _bulk / HEC). Multiple exporters run concurrently.
# Prefer syslog tcp/tls over udp when delivery matters: a "connected" UDP
# socket's write succeeds locally even when the SIEM is black-holing, so the
# omnisag_eventexport_dropped_total metric cannot observe UDP delivery failures.
# export:
#   enabled: true
#   exporters:
#     - name: arcsight                 # cef over TLS syslog
#       format: cef
#       transport: syslog
#       syslog: { address: "arcsight:6514", protocol: tls, facility: local0,
#                 tls: { ca: "ca.pem", cert: "c.pem", key: "k.pem" } }
#     - name: elastic-filebeat         # ECS lines a filebeat tailer ships
#       format: ecs
#       transport: file
#       file: { path: "/var/log/omni-sag/events.ecs.jsonl" }
#     - name: elastic-direct           # ECS straight to Elastic _bulk
#       format: ecs
#       transport: http
#       http: { url: "https://es:9200/_bulk", batch_size: 100,
#               flush_interval_seconds: 5,
#               auth: { bearer_env: "ES_TOKEN" }, tls: { ca: "es-ca.pem" } }
#       buffer_size: 10000             # per-exporter bounded queue (default 10000)

# Capability toggles. The three disable_* below default false (enabled); any
# combination may be disabled independently, but at least one must stay
# enabled. Uncomment to restrict this gateway to, e.g., tunnel-only:
# disable_ssh: true      # reject interactive PTY shell
# disable_tunnel: true   # reject -L port forwarding
# disable_sftp: true     # reject the SFTP subsystem (also disables default-
#                        # protocol scp, which rides the same subsystem)
#
# enable_scp is the OPPOSITE sense — opt-in, default OFF. The legacy
# exec-based scp protocol (OpenSSH's "-O" flag) stays disabled unless you set
# this. Modern scp clients need nothing here — they use the SFTP subsystem
# above. Only enable for old clients that force the legacy protocol:
# enable_scp: true       # serve legacy-protocol scp ("-O" flag)

ldap:
  url: "ldaps://127.0.0.1:636"
  base_dn: "DC=lab,DC=local"
  bind_dn: "CN=Administrator,CN=Users,DC=lab,DC=local"
  bind_password: "LabAdminPass123!"
  user_filter: "(sAMAccountName=%s)"
  insecure_tls: true # dev only: samba-AD self-signed cert
  # nested_groups: resolve transitive/AGDLP-nested membership via AD's
  # DC-computed tokenGroups attribute (then resolve SIDs to names), instead of
  # reading direct memberOf only. Enable when roles bind to domain-local groups
  # a user holds through nesting — nested groups a plain memberOf read misses.
  # Fast even for users in many groups. Off by default.
  # nested_groups: true

# MFA (Slice 2): second factor after LDAPS primary. Disabled by default so the
# Slice 1 demo still runs. Enable to gate logins behind RADIUS MS-CHAPv2.
mfa:
  enabled: false
  radius:
    server: "127.0.0.1:1812"
    secret: "testing123"
    nas_identifier: "omni-sag"
    timeout_seconds: 5
    retries: 2
    # Push-style MFA (NPS+Entra) uses Access-Accept/Reject and needs no prompt.
    # Interactive OTP (Access-Challenge) is off by default and, over the SSH
    # password path, fails closed because it cannot prompt.
    allow_interactive_challenge: false

# Recording (Slice 4): where interactive session asciicasts are stored. Absent
# disables recording. Set exactly one of local_dir or s3.
recording:
  local_dir: "recordings"
  # s3:
  #   endpoint: "127.0.0.1:9000"
  #   access_key: "omnisag"
  #   secret_key: "omnisag-dev-secret"
  #   bucket: "omni-sag-recordings"
  #   use_ssl: false

# Evidence backend — set exactly one of: file, s3, or pipeline.
#   file     : crude JSONL (Slice 1), infra-free dev
#   s3       : crude per-event objects on MinIO (Slice 1)
#   pipeline : ordered, hash-chained, signed-checkpoint pipeline (Slice 3)
#              Verify offline with:
#                omni-verify -bundle <data_dir> -pubkey <signing key> -head <chain head>
#              -pubkey (the gateway's public key, delivered out of band) is
#              REQUIRED to assert authenticity; without it omni-verify reports
#              UNVERIFIED (exit 3). -head (logged by the gateway at shutdown as
#              "evidence chain head=") detects trailing truncation.
evidence:
  file: "evidence.jsonl"
  # s3:
  #   endpoint: "127.0.0.1:9000"
  #   access_key: "omnisag"
  #   secret_key: "omnisag-dev-secret"
  #   bucket: "omni-sag-evidence"
  #   use_ssl: false
  # pipeline:
  #   data_dir: "evidence"           # local segments/, checkpoints/, epoch
  #   signing_key: "evidence-key.pem" # Ed25519, created 0600 if absent
  #   segment_size: 128              # records per sealed segment
  #   worm:                          # optional Object-Locked (WORM) S3 archive
  #     endpoint: "127.0.0.1:9000"
  #     access_key: "omnisag"
  #     secret_key: "omnisag-dev-secret"
  #     bucket: "omni-sag-evidence-worm" # must be Object-Lock enabled at creation
  #     use_ssl: false
  #     mode: COMPLIANCE             # or GOVERNANCE
  #     retention_days: 3650

# Content inspection (Slice 5): ICAP scanning of SFTP uploads. Disabled by
# default. When enabled, uploads stream through the ICAP service; blocked or
# unscannable content is quarantined (WORM) and the transfer is refused.
# Files larger than threshold_bytes stream via the transient holding bucket so
# a large clean file is never buffered whole (no OOM).
inspection:
  enabled: false
  icap:
    endpoint: "127.0.0.1:1344"
    service: "avscan"
    preview_bytes: 4096
    timeout_seconds: 30
  threshold_bytes: 1048576
  holding: # transient (non-locked) bucket for large files being inspected
    endpoint: "127.0.0.1:9000"
    access_key: "omnisag"
    secret_key: "omnisag-dev-secret"
    bucket: "omni-sag-holding"
    use_ssl: false
  quarantine: # Object-Lock-enabled bucket for blocked/unscannable content
    endpoint: "127.0.0.1:9000"
    access_key: "omnisag"
    secret_key: "omnisag-dev-secret"
    bucket: "omni-sag-quarantine" # must be Object-Lock enabled at creation
    use_ssl: false
    mode: COMPLIANCE
    retention_days: 3650

# Tunnel protocol identification: fingerprints the opening bytes of -L/-D
# tunnels to identify the protocol actually flowing through them (e.g. an
# operator opened -L 5432 but something that isn't Postgres is riding it).
# Disabled by default. observe mode (enforce: false) only logs a
# tunnel_protocol evidence event per tunnel; enforce mode additionally
# terminates a tunnel whose detected protocol isn't in a rule's
# expect_protocol allow-list (see the policy example below) — with enforce
# left false, expect_protocol rules run in dry-run: would-block is logged
# (allow=false, detail mentions "dry-run"), nothing is terminated.
# unknown_action controls what happens when the protocol can't be
# identified: allow (default, avoids false-positive outages) or deny.
# smtp/ftp are banner-ambiguous (both greet with "220 ") and are best-effort:
# don't rely on expect_protocol: [smtp]/[ftp] alone to tell them apart.
# tunnel_inspection:
#   enabled: true
#   max_prefix_bytes: 512            # per-direction classification budget
#   classify_timeout_seconds: 5
#   enforce: false                   # false = observe/dry-run only
#   unknown_action: allow            # allow | deny

# Credential injection (Slice 6): the gateway can source a target credential
# from CyberArk CCP over mutual TLS. Required only if a rule uses credential
# "inject". If inject is configured and CyberArk is unavailable, the session
# FAILS CLOSED — it is never downgraded to prompt/passthrough (PRD FR-18).
# cyberark:
#   base_url: "https://ccp.lab.local/AIMWebService"
#   client_cert: "cyberark-client.crt"  # mTLS gateway identity (PEM)
#   client_key:  "cyberark-client.key"
#   ca_cert:     "cyberark-ca.crt"       # verifies the CCP server (no skip-verify)
#   app_id: "omni-sag"
#   safe: "targets"
#   object_template: "{host}"            # {host} is replaced by the target host
#   timeout_seconds: 10
#   breaker_failures: 3
#   breaker_cooldown_seconds: 30

# Control-plane API (Slice 7): runs on its own listener, out-of-band from SSH —
# stopping it never drops live SSH sessions or blocks new ones. Disabled unless
# this block is present. Dev uses plain HTTP + bearer tokens; production sets
# tls_cert/tls_key (HTTPS) and either tokens (OIDC JWTs) or client_ca + cn_roles
# (mTLS). RBAC: viewer (read) < operator (terminate) < admin.
# api:
#   listen: ":8443"
#   # tls_cert: "api-cert.pem"   # HTTPS; omit for dev HTTP
#   # tls_key:  "api-key.pem"
#   # client_ca: "client-ca.pem" # enables mTLS; map CNs below
#   tokens:
#     - { token: "dev-viewer",  subject: "ops-read",  role: "viewer" }
#     - { token: "dev-operator", subject: "ops",      role: "operator" }
#   # cn_roles:
#   #   - { cn: "ops@corp", role: "operator" }

# Four-eyes approvals: required for any rule setting require_approval, and
# for SFTP's quarantine-release flow (a KindQuarantineRelease approval, using
# release_ttl_seconds instead of ttl_seconds). use_crd swaps in the (stubbed)
# Kubernetes CRD store instead of the durable file store — not yet wired to a
# real cluster.
# approval:
#   store_path: "approvals.json"
#   ttl_seconds: 900            # session-access approval pending lifetime
#   release_ttl_seconds: 86400  # quarantine-release approval pending lifetime (24h)
#   use_crd: false

# Policy hot-reload source (Slice 7). Omit to reload from this config file.
# CRD-backed source (Kubernetes informer) lands as a follow-up; until then the
# file source hot-reloads on change and a bad edit keeps the last good policy.
# policy_source:
#   file: "policy.yaml"

# CIDR ranges are accepted as Rule.Host anywhere below (e.g. "10.0.0.0/8"),
# alongside exact hostnames and "*". A hostname target is matched against a
# CIDR rule by resolving it first; uncomment to turn that resolution off
# (CIDR rules then only ever match IP-literal targets):
# policy:
#   disable_cidr_hostname_resolution: true
policy:
  roles:
    - name: dba
      groups: ["dba"] # AD group granting this role
      allow:
        - host: "db1.lab.local"
          ports: [5432]
          # record (Slice 4): none (default) | metadata-only | full
          #   full          -> -L forwarding is REFUSED (session must be recorded)
          #   metadata-only -> -L allowed, evidence marks the session unrecorded
          record: none
          # credential (Slice 6): passthrough (default) | prompt | inject | deny
          #   inject -> fetch from CyberArk; fails closed if CCP is unavailable
          credential: passthrough
          # require_approval (Slice 6): four-eyes-gate this rule — the
          # session blocks until a second human approves via omnisag-ctl/API
          # (never the requester themselves). Needs the approval: block above.
          # require_approval: false
          # expect_protocol (opt-in enforcement, needs tunnel_inspection.
          # enabled: true above): allow-list of protocols permitted through
          # this rule's -L/-D tunnel, e.g. ["postgres"]. Only enforced when
          # tunnel_inspection.enforce is also true; absent = observe only.
          # expect_protocol: [postgres]
        # Real-target demo (this design's shell/SFTP proxy, not the -L tunnel
        # above): alice gets a genuine shell/SFTP on the ssh-target container,
        # authenticated as svc_db1. Uses "prompt" rather than "inject" because
        # no mock CyberArk CCP service runs in this compose lab (only the CCP
        # *client* is exercised, against an in-process httptest.Server, in
        # internal/credential/ccp_test.go) — inject would fail closed here
        # with no CCP to fetch from. prompt exercises the same target-side
        # password-auth path as inject would, with no extra infrastructure.
        - host: "127.0.0.1"
          ports: [2200]
          target_user: "svc_db1"
          record: full
          credential: prompt
        # CIDR rule example: grant access to an entire subnet via CIDR notation
        # (e.g. all databases in the 10.0.0.0/8 range). Matching works the same
        # as exact hostnames but applies to IP ranges; hostname targets are
        # resolved and must fall entirely within the CIDR range to match.
        - host: "10.0.0.0/8"
          ports: [5432]
          record: metadata-only
          credential: prompt
    # Multi-CIDR example: infrastructure team can SSH to any host in three
    # regional networks (corp VPC, staging VPC, backup network). Multiple CIDR
    # rules are evaluated independently; a hostname must resolve entirely within
    # a single CIDR rule to match (partial or split matches are denied).
    - name: infrastructure
      groups: ["ops"]
      allow:
        - host: "10.0.0.0/8"       # entire corp network
          ports: [22]
          record: metadata-only
          credential: prompt
        - host: "172.16.0.0/12"     # staging VPC
          ports: [22]
          record: metadata-only
          credential: prompt
        - host: "192.168.0.0/16"    # backup network
          ports: [22]
          record: metadata-only
          credential: prompt
