# Sample config for the docker-compose dev lab (samba-AD + MinIO + FreeRADIUS).
# Run: omni-sag -config deploy/compose/config.example.yaml
listen: ":2222"
host_key: "hostkey.pem"

ldap:
  url: "ldaps://127.0.0.1:636"
  base_dn: "DC=lab,DC=local"
  bind_dn: "CN=Administrator,CN=Users,DC=lab,DC=local"
  bind_password: "LabAdminPass123!"
  user_filter: "(sAMAccountName=%s)"
  insecure_tls: true # dev only: samba-AD self-signed cert

# MFA (Slice 2): second factor after LDAPS primary. Disabled by default so the
# Slice 1 demo still runs. Enable to gate logins behind RADIUS MS-CHAPv2.
mfa:
  enabled: false
  radius:
    server: "127.0.0.1:1812"
    secret: "testing123"
    nas_identifier: "omni-sag"
    timeout_seconds: 5
    retries: 2
    # Push-style MFA (NPS+Entra) uses Access-Accept/Reject and needs no prompt.
    # Interactive OTP (Access-Challenge) is off by default and, over the SSH
    # password path, fails closed because it cannot prompt.
    allow_interactive_challenge: false

# Recording (Slice 4): where interactive session asciicasts are stored. Absent
# disables recording. Set exactly one of local_dir or s3.
recording:
  local_dir: "recordings"
  # s3:
  #   endpoint: "127.0.0.1:9000"
  #   access_key: "omnisag"
  #   secret_key: "omnisag-dev-secret"
  #   bucket: "omni-sag-recordings"
  #   use_ssl: false

# Evidence backend — set exactly one of: file, s3, or pipeline.
#   file     : crude JSONL (Slice 1), infra-free dev
#   s3       : crude per-event objects on MinIO (Slice 1)
#   pipeline : ordered, hash-chained, signed-checkpoint pipeline (Slice 3)
#              Verify offline with:
#                omni-verify -bundle <data_dir> -pubkey <signing key> -head <chain head>
#              -pubkey (the gateway's public key, delivered out of band) is
#              REQUIRED to assert authenticity; without it omni-verify reports
#              UNVERIFIED (exit 3). -head (logged by the gateway at shutdown as
#              "evidence chain head=") detects trailing truncation.
evidence:
  file: "evidence.jsonl"
  # s3:
  #   endpoint: "127.0.0.1:9000"
  #   access_key: "omnisag"
  #   secret_key: "omnisag-dev-secret"
  #   bucket: "omni-sag-evidence"
  #   use_ssl: false
  # pipeline:
  #   data_dir: "evidence"           # local segments/, checkpoints/, epoch
  #   signing_key: "evidence-key.pem" # Ed25519, created 0600 if absent
  #   segment_size: 128              # records per sealed segment
  #   worm:                          # optional Object-Locked (WORM) S3 archive
  #     endpoint: "127.0.0.1:9000"
  #     access_key: "omnisag"
  #     secret_key: "omnisag-dev-secret"
  #     bucket: "omni-sag-evidence-worm" # must be Object-Lock enabled at creation
  #     use_ssl: false
  #     mode: COMPLIANCE             # or GOVERNANCE
  #     retention_days: 3650

# Content inspection (Slice 5): ICAP scanning of SFTP uploads. Disabled by
# default. When enabled, uploads stream through the ICAP service; blocked or
# unscannable content is quarantined (WORM) and the transfer is refused.
# Files larger than threshold_bytes stream via the transient holding bucket so
# a large clean file is never buffered whole (no OOM).
inspection:
  enabled: false
  icap:
    endpoint: "127.0.0.1:1344"
    service: "avscan"
    preview_bytes: 4096
    timeout_seconds: 30
  threshold_bytes: 1048576
  holding: # transient (non-locked) bucket for large files being inspected
    endpoint: "127.0.0.1:9000"
    access_key: "omnisag"
    secret_key: "omnisag-dev-secret"
    bucket: "omni-sag-holding"
    use_ssl: false
  quarantine: # Object-Lock-enabled bucket for blocked/unscannable content
    endpoint: "127.0.0.1:9000"
    access_key: "omnisag"
    secret_key: "omnisag-dev-secret"
    bucket: "omni-sag-quarantine" # must be Object-Lock enabled at creation
    use_ssl: false
    mode: COMPLIANCE
    retention_days: 3650

# Credential injection (Slice 6): the gateway can source a target credential
# from CyberArk CCP over mutual TLS. Required only if a rule uses credential
# "inject". If inject is configured and CyberArk is unavailable, the session
# FAILS CLOSED — it is never downgraded to prompt/passthrough (PRD FR-18).
# cyberark:
#   base_url: "https://ccp.lab.local/AIMWebService"
#   client_cert: "cyberark-client.crt"  # mTLS gateway identity (PEM)
#   client_key:  "cyberark-client.key"
#   ca_cert:     "cyberark-ca.crt"       # verifies the CCP server (no skip-verify)
#   app_id: "omni-sag"
#   safe: "targets"
#   object_template: "{host}"            # {host} is replaced by the target host
#   timeout_seconds: 10
#   breaker_failures: 3
#   breaker_cooldown_seconds: 30

# Control-plane API (Slice 7): runs on its own listener, out-of-band from SSH —
# stopping it never drops live SSH sessions or blocks new ones. Disabled unless
# this block is present. Dev uses plain HTTP + bearer tokens; production sets
# tls_cert/tls_key (HTTPS) and either tokens (OIDC JWTs) or client_ca + cn_roles
# (mTLS). RBAC: viewer (read) < operator (terminate) < admin.
# api:
#   listen: ":8443"
#   # tls_cert: "api-cert.pem"   # HTTPS; omit for dev HTTP
#   # tls_key:  "api-key.pem"
#   # client_ca: "client-ca.pem" # enables mTLS; map CNs below
#   tokens:
#     - { token: "dev-viewer",  subject: "ops-read",  role: "viewer" }
#     - { token: "dev-operator", subject: "ops",      role: "operator" }
#   # cn_roles:
#   #   - { cn: "ops@corp", role: "operator" }

# Policy hot-reload source (Slice 7). Omit to reload from this config file.
# CRD-backed source (Kubernetes informer) lands as a follow-up; until then the
# file source hot-reloads on change and a bad edit keeps the last good policy.
# policy_source:
#   file: "policy.yaml"

policy:
  roles:
    - name: dba
      groups: ["dba"] # AD group granting this role
      allow:
        - host: "db1.lab.local"
          ports: [5432]
          # record (Slice 4): none (default) | metadata-only | full
          #   full          -> -L forwarding is REFUSED (session must be recorded)
          #   metadata-only -> -L allowed, evidence marks the session unrecorded
          record: none
          # credential (Slice 6): passthrough (default) | prompt | inject | deny
          #   inject -> fetch from CyberArk; fails closed if CCP is unavailable
          credential: passthrough
        # Real-target demo (this design's shell/SFTP proxy, not the -L tunnel
        # above): alice gets a genuine shell/SFTP on the ssh-target container,
        # authenticated as svc_db1 via the mock CyberArk CCP below.
        - host: "127.0.0.1"
          ports: [2200]
          target_user: "svc_db1"
          record: full
          credential: inject
