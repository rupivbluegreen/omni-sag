# Dev-lab RADIUS client: the Omni-SAG gateway. Shared secret is lab-only.
client omni-sag {
    ipaddr = 0.0.0.0/0
    secret = testing123
    # Dev lab: our MS-CHAPv2 Access-Requests don't carry Message-Authenticator,
    # so relax the BlastRADIUS-era enforcement. Do NOT do this in production.
    require_message_authenticator = no
    limit_proxy_state = no
}
