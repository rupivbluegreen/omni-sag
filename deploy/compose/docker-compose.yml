services:
  samba-ad:
    image: nowsci/samba-domain
    container_name: omni-sag-samba-ad
    hostname: dc1
    dns_search: lab.local
    environment:
      DOMAIN: "LAB.LOCAL"
      DOMAINPASS: "LabAdminPass123!"
      DNS_FORWARDER: "8.8.8.8"
      INSECURE_LDAP: "true"
      NOCOMPLEXITY: "true"
    ports:
      - "389:389"
      - "636:636"
      - "3268:3268"
      - "3269:3269"
      # Host DNS (53) is intentionally not published: systemd-resolved owns it,
      # and the gateway resolves targets itself. Samba runs DNS inside the
      # container namespace regardless.
      - "88:88/tcp"
      - "88:88/udp"
      - "464:464/tcp"
      - "464:464/udp"
    cap_add:
      - NET_ADMIN
      # SYS_ADMIN lets samba set the security.NTACL xattr on sysvol during
      # domain provisioning; without it provisioning fails ACCESS_DENIED.
      # Dev-lab only — unrelated to the gateway's restricted-v2 posture.
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    restart: unless-stopped
    volumes:
      - samba-data:/var/lib/samba
      - samba-config:/etc/samba/external

  minio:
    image: minio/minio:latest
    container_name: omni-sag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: omnisag
      MINIO_ROOT_PASSWORD: omnisag-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio-data:/data
    restart: unless-stopped

  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: omni-sag-freeradius
    # RADIUS (MS-CHAPv2) second-factor authority for the Slice 2 demo. It
    # simulates NPS+Entra MFA outcomes: alice is approved, bob is denied.
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./freeradius/clients.conf:/etc/raddb/clients.conf:ro
      - ./freeradius/authorize:/etc/raddb/mods-config/files/authorize:ro
    restart: unless-stopped

  ssh-target:
    image: linuxserver/openssh-server:latest
    container_name: omni-sag-ssh-target
    hostname: db1
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Etc/UTC"
      PASSWORD_ACCESS: "true"
      USER_NAME: "svc_db1"
      USER_PASSWORD: "InjectedSecret123!"
    ports:
      - "2200:2222"
    restart: unless-stopped

volumes:
  samba-data:
  samba-config:
  minio-data:
